<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f2f2f7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Abudata POS - Premium Mobile</title>
    <style>
        :root {
            --primary: #007aff;
            --primary-dark: #005ecb;
            --primary-soft: #eaf3ff;
            --bg-body: #f2f2f7;
            --surface: #ffffff;
            --surface-elevated: rgba(255, 255, 255, 0.78);
            --text-dark: #111827;
            --text-light: #6b7280;
            --success: #34c759;
            --danger: #ff3b30;
            --border: #d1d1d6;
            --glass-border: rgba(255, 255, 255, 0.75);
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --shadow-soft: 0 14px 32px -24px rgba(15, 23, 42, 0.45);
            --safe-top: env(safe-area-inset-top, 0px);
            --header-height: calc(60px + var(--safe-top));
            --bottom-area-height: 108px;
            --app-shell-max-width: 1080px;
            --mobile-font-scale: 1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
        }

        html {
            font-size: calc(16px * var(--mobile-font-scale));
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: radial-gradient(circle at 15% 0%, #ffffff 0%, #f5f7fc 48%, #edf1f8 100%);
            color: var(--text-dark);
            font-family: 'SF Pro Text', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            padding-bottom: calc(var(--bottom-area-height) + env(safe-area-inset-bottom));
        }

        button,
        input {
            font: inherit;
        }

        .app-shell {
            max-width: var(--app-shell-max-width);
            margin: 0 auto;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: var(--surface-elevated);
            backdrop-filter: saturate(175%) blur(18px);
            -webkit-backdrop-filter: saturate(175%) blur(18px);
            border-bottom: 1px solid rgba(182, 188, 200, 0.45);
            box-shadow: inset 0 -1px 0 var(--glass-border);
            padding: calc(var(--safe-top) + 0.5rem) 1rem 0.48rem;
        }

        .app-title {
            color: var(--text-dark);
            font-size: clamp(1rem, 2.7vw, 1.15rem);
            line-height: 1.2;
            letter-spacing: -0.025em;
            font-weight: 700;
            text-align: center;
            margin: 0 auto;
        }

        .category-scroll {
            position: sticky;
            top: var(--header-height);
            z-index: 35;
            display: flex;
            gap: 0.48rem;
            padding: 0.56rem 1rem 0.82rem;
            margin-bottom: 0.42rem;
            overflow-x: auto;
            scrollbar-width: none;
            background: rgba(246, 248, 253, 0.98);
            border-bottom: 1px solid rgba(199, 208, 221, 0.72);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .pill {
            border: 1px solid rgba(60, 60, 67, 0.2);
            background: rgba(255, 255, 255, 0.84);
            color: var(--text-light);
            border-radius: 999px;
            padding: 0.5rem 0.84rem;
            font-size: 0.8rem;
            line-height: 1;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            flex: 0 0 auto;
            cursor: pointer;
            box-shadow: none;
            transition: 0.18s ease;
        }

        .pill svg {
            width: 1em;
            height: 1em;
            stroke-width: 2.1;
            display: block;
            flex: 0 0 auto;
        }

        .pill.active {
            border-color: transparent;
            background: var(--primary);
            color: var(--surface);
            box-shadow: 0 7px 14px -12px rgba(0, 122, 255, 0.55);
        }

        .main-content {
            padding: 0.5rem 1rem 1rem;
        }

        .ticket-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-top: 0;
        }

        .ticket-card {
            background: var(--surface);
            display: flex;
            border: 1px solid rgba(171, 184, 204, 0.26);
            border-radius: 17px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            cursor: pointer;
            position: relative;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .ticket-card:active {
            transform: scale(0.994);
            box-shadow: 0 10px 24px -22px rgba(15, 23, 42, 0.9);
            border-color: rgba(113, 125, 146, 0.28);
        }

        .ticket-main {
            padding: 0.84rem 0.82rem 0.84rem 0.92rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            min-width: 0;
        }

        .ticket-divider {
            position: relative;
            width: 16px;
            flex: 0 0 16px;
            display: flex;
            justify-content: center;
        }

        .ticket-divider-line {
            width: 1px;
            height: calc(100% - 18px);
            margin: 9px 0;
            background-image: repeating-linear-gradient(
                to bottom,
                #d2d9e5 0 4px,
                transparent 4px 8px
            );
        }

        .ticket-divider::before,
        .ticket-divider::after {
            content: '';
            position: absolute;
            left: 50%;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transform: translateX(-50%);
            background: var(--bg-body);
            border: 1px solid #dbe3ef;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
        }

        .ticket-divider::before {
            top: -7px;
        }

        .ticket-divider::after {
            bottom: -7px;
        }

        .ticket-meta {
            width: max-content;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.21rem 0.5rem;
            border-radius: 999px;
            font-size: 0.62rem;
            line-height: 1;
            font-weight: 600;
            text-transform: none;
            letter-spacing: 0.01em;
            background: #eaf3ff;
            color: #0a63ca;
        }

        .ticket-meta.wisata {
            background: #fff3dc;
            color: #9a5b00;
        }

        .ticket-meta.kendaraan {
            background: #e6f8f0;
            color: #0f8f60;
        }

        .ticket-meta svg {
            width: 0.95em;
            height: 0.95em;
            display: block;
            flex: 0 0 auto;
        }

        .ticket-main h3 {
            font-size: 0.93rem;
            line-height: 1.28;
            letter-spacing: -0.015em;
            font-weight: 650;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ticket-main p {
            font-size: 0.74rem;
            color: var(--text-light);
            line-height: 1.34;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ticket-side {
            width: clamp(86px, 26vw, 110px);
            padding: 0.72rem 0.6rem 0.72rem 0.42rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            gap: 0.1rem;
            background: linear-gradient(160deg, #f5f9ff, #ffffff 68%);
        }

        .price-label {
            font-size: 0.58rem;
            color: #8893a9;
            letter-spacing: 0.04em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .price-tag {
            margin-top: 0.04rem;
            display: inline-flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 0.14rem;
            white-space: nowrap;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .price-currency {
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--primary);
            transform: translateY(-1px);
        }

        .price-value {
            font-weight: 700;
            color: #0a5ec0;
            font-size: 0.96rem;
            letter-spacing: -0.02em;
        }

        .price-tag.is-long .price-value {
            font-size: 0.8rem;
            letter-spacing: -0.03em;
        }

        .empty-state {
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.87);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .bottom-action {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            padding: 0.56rem 0.8rem calc(0.64rem + env(safe-area-inset-bottom));
        }

        .bottom-action-inner {
            margin: 0 auto;
            max-width: 1080px;
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid rgba(176, 187, 204, 0.5);
            border-radius: 24px;
            box-shadow: 0 20px 40px -32px rgba(15, 23, 42, 0.8);
            backdrop-filter: saturate(180%) blur(16px);
            -webkit-backdrop-filter: saturate(180%) blur(16px);
            padding: 0.58rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.55rem;
        }

        .cart-trigger {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            min-width: 0;
        }

        .badge-icon {
            position: relative;
            background: var(--primary-soft);
            padding: 0.58rem;
            border-radius: 0.85rem;
            color: var(--primary-dark);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px rgba(0, 122, 255, 0.12);
        }

        .badge-icon svg {
            width: 1.25rem;
            height: 1.25rem;
            display: block;
            flex: 0 0 auto;
        }

        .badge-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary);
            color: var(--surface);
            font-size: 0.63rem;
            font-weight: 800;
            line-height: 1;
            padding: 0.22rem 0.36rem;
            border-radius: 999px;
            border: 2px solid var(--surface);
            min-width: 1.15rem;
            text-align: center;
            box-shadow: 0 4px 8px -6px rgba(0, 122, 255, 0.7);
        }

        .cart-label {
            font-size: 0.68rem;
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0;
        }

        .cart-total {
            font-weight: 700;
            font-size: 0.93rem;
            margin-top: 0.05rem;
            white-space: nowrap;
            letter-spacing: -0.012em;
        }

        .btn-checkout {
            border: none;
            border-radius: 14px;
            padding: 0.75rem 1.02rem;
            min-width: 124px;
            background: linear-gradient(180deg, #1a8cff, var(--primary));
            color: var(--surface);
            font-size: 0.89rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            box-shadow: 0 12px 20px -16px rgba(0, 122, 255, 0.8);
            cursor: pointer;
            transition: 0.18s ease;
        }

        .btn-checkout:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            box-shadow: none;
            background: #b9c7da;
        }

        .btn-checkout:not(:disabled):active {
            transform: scale(0.985);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(17, 25, 40, 0.42);
            display: none;
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .modal.active {
            display: flex;
        }

        .modal-body {
            background: rgba(248, 250, 255, 0.95);
            width: min(100%, 560px);
            border-radius: 24px 24px 0 0;
            border: 1px solid rgba(188, 197, 214, 0.35);
            border-bottom: none;
            padding: 1.38rem 1rem 1rem;
            max-height: 92vh;
            overflow-y: auto;
            animation: slide-up 0.26s ease;
        }

        .modal-body::before {
            content: '';
            display: block;
            width: 40px;
            height: 5px;
            margin: -0.55rem auto 0.82rem;
            border-radius: 999px;
            background: rgba(120, 130, 148, 0.34);
        }

        .modal-center {
            align-items: center;
            padding: 0.9rem;
        }

        .modal-center .receipt-modal-card {
            width: min(100%, 390px);
            background: rgba(248, 250, 255, 0.96);
            border: 1px solid rgba(188, 197, 214, 0.35);
            border-radius: 18px;
            padding: 1rem;
            animation: fade-up 0.22s ease;
            box-shadow: 0 18px 38px -26px rgba(15, 23, 42, 0.88);
        }

        @keyframes slide-up {
            from {
                transform: translateY(18px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fade-up {
            from {
                transform: translateY(12px) scale(0.99);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .payment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .payment-header h3 {
            font-weight: 700;
            font-size: 1.08rem;
            line-height: 1.25;
            letter-spacing: -0.02em;
        }

        .payment-header p {
            margin-top: 0.2rem;
            color: var(--text-light);
            font-size: 0.79rem;
            font-weight: 450;
        }

        .btn-icon {
            border: 1px solid var(--border);
            background: rgba(240, 244, 251, 0.85);
            width: 36px;
            height: 36px;
            border-radius: 999px;
            font-size: 1.3rem;
            line-height: 1;
            color: #6d7688;
            cursor: pointer;
            transition: 0.16s ease;
        }

        .btn-icon:active {
            transform: scale(0.96);
        }

        .payment-summary {
            border: 1px solid #d9e8ff;
            background: linear-gradient(160deg, #f4f8ff, #ffffff);
            border-radius: 16px;
            padding: 0.8rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .payment-summary p {
            font-size: 0.75rem;
            letter-spacing: 0.01em;
            font-weight: 600;
            color: #426290;
            text-transform: none;
        }

        .payment-summary h2 {
            margin-top: 0.2rem;
            font-size: 1.74rem;
            color: #0457b8;
            font-weight: 720;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 0.45rem;
            text-transform: none;
            letter-spacing: 0;
        }

        .input-box {
            width: 100%;
            border: 1.5px solid #d2d7e2;
            background: #f4f6fb;
            border-radius: 14px;
            padding: 0.75rem 0.85rem;
            text-align: right;
            font-size: 1.15rem;
            font-weight: 650;
            outline: none;
            transition: 0.16s ease;
        }

        .input-box:focus {
            border-color: #84bdff;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12);
        }

        .shortcut-label {
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 0.46rem;
            text-transform: none;
            letter-spacing: 0;
        }

        .shortcuts {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.45rem;
            margin-bottom: 1rem;
        }

        .btn-shortcut {
            border: 1px solid #d4dae6;
            background: #f6f8fc;
            color: #445068;
            border-radius: 12px;
            padding: 0.58rem 0.4rem;
            font-size: 0.73rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.16s ease;
        }

        .btn-shortcut:active {
            background: #ecf1fa;
            transform: scale(0.985);
        }

        .kembalian-box {
            border: 1px solid #c8f0d7;
            background: #eefbf3;
            border-radius: 14px;
            padding: 0.72rem 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .kembalian-label {
            color: #1f8f5d;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .kembalian-value {
            color: var(--success);
            font-size: 1rem;
            font-weight: 700;
        }

        .btn-confirm {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 0.85rem;
            background: linear-gradient(180deg, #1a8cff, var(--primary));
            color: var(--surface);
            font-size: 0.93rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            box-shadow: 0 12px 20px -16px rgba(0, 122, 255, 0.85);
            cursor: pointer;
            transition: 0.16s ease;
        }

        .btn-confirm:active {
            transform: scale(0.99);
        }

        .receipt-container {
            padding: 0.2rem 0;
        }

        .receipt-paper {
            border: 1px solid #dbe3ef;
            border-radius: 12px;
            background: #ffffff;
            padding: 0.92rem;
            color: #111827;
            font-family: 'SF Mono', 'SFMono-Regular', ui-monospace, 'Cascadia Mono', 'Consolas', monospace;
        }

        .receipt-head {
            text-align: center;
            margin-bottom: 0.85rem;
        }

        .receipt-head h3 {
            font-size: 0.96rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .receipt-head p {
            margin-top: 0.24rem;
            font-size: 0.66rem;
            color: #475569;
        }

        .receipt-meta {
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 0.56rem;
            margin-bottom: 0.72rem;
            background: #f8fafc;
            display: grid;
            gap: 0.26rem;
        }

        .receipt-meta-line {
            display: flex;
            justify-content: space-between;
            gap: 0.7rem;
            font-size: 0.65rem;
        }

        .receipt-meta-line span {
            color: #64748b;
        }

        .receipt-meta-line strong {
            color: #0f172a;
            font-weight: 700;
            text-align: right;
        }

        .receipt-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.69rem;
        }

        .receipt-table th,
        .receipt-table td {
            padding: 0.36rem 0;
            border-bottom: 1px dashed #dbe3ef;
            vertical-align: top;
        }

        .receipt-table th {
            color: #64748b;
            text-transform: uppercase;
            font-size: 0.62rem;
            letter-spacing: 0.04em;
            font-weight: 700;
        }

        .receipt-table th:last-child,
        .receipt-table td:last-child {
            text-align: right;
        }

        .receipt-item-name {
            display: block;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.28;
        }

        .receipt-item-qty {
            display: block;
            margin-top: 0.16rem;
            font-size: 0.61rem;
            color: #64748b;
        }

        .receipt-summary {
            margin-top: 0.62rem;
            display: grid;
            gap: 0.26rem;
            font-size: 0.69rem;
        }

        .receipt-summary-line {
            display: flex;
            justify-content: space-between;
            gap: 0.7rem;
        }

        .receipt-summary-line strong {
            font-weight: 700;
        }

        .receipt-summary-line.total {
            margin-top: 0.28rem;
            padding-top: 0.4rem;
            border-top: 1px solid #dbe3ef;
            font-size: 0.76rem;
            font-weight: 700;
        }

        .receipt-summary-line.change strong {
            color: var(--success);
        }

        .receipt-footer {
            margin-top: 0.75rem;
            text-align: center;
            font-size: 0.62rem;
            color: #64748b;
        }

        .receipt-actions {
            margin-top: 0.95rem;
            display: grid;
            gap: 0.58rem;
        }

        .btn-print-receipt {
            width: 100%;
            border: 1px solid #cdd7e6;
            border-radius: 14px;
            padding: 0.78rem 0.9rem;
            background: #ffffff;
            color: #2563eb;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: 0.16s ease;
        }

        .btn-print-receipt:active {
            transform: scale(0.99);
        }

        .btn-print-receipt:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .btn-connect-printer {
            width: 100%;
            border: 1px solid #cdd7e6;
            border-radius: 14px;
            padding: 0.74rem 0.9rem;
            background: #f8fafc;
            color: #1f2937;
            font-size: 0.83rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: 0.16s ease;
        }

        .btn-connect-printer:active {
            transform: scale(0.99);
        }

        .btn-connect-printer:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        @media (min-width: 640px) {
            :root {
                --header-height: calc(62px + var(--safe-top));
                --bottom-area-height: 120px;
            }

            .app-header {
                padding: calc(var(--safe-top) + 0.54rem) 1.15rem 0.54rem;
            }

            .category-scroll,
            .main-content {
                padding-left: 1.15rem;
                padding-right: 1.15rem;
            }

            .ticket-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.85rem;
            }

            .ticket-main {
                padding: 0.82rem 0.84rem 0.85rem 0.9rem;
            }

            .ticket-divider {
                width: 17px;
