    <script>
        const fallbackProducts = [
            { id: 'w1', category: 'wisata', name: 'Tiket Terusan Dufan', price: 275000, desc: 'Akses penuh ke semua wahana.' },
            { id: 'w2', category: 'wisata', name: 'Tiket Ragunan', price: 15000, desc: 'Tiket masuk dewasa.' },
            { id: 'w3', category: 'wisata', name: 'Tiket Candi Borobudur', price: 50000, desc: 'Tiket domestik area pelataran.' },
            { id: 'k1', category: 'kendaraan', name: 'Tiket Bus Trans', price: 3500, desc: 'Tarif flat satu kali jalan.' },
            { id: 'k2', category: 'kendaraan', name: 'Tiket Damri Bandara', price: 65000, desc: 'Rute eksekutif ke Soekarno-Hatta.' },
            { id: 'k3', category: 'kendaraan', name: 'Tiket KAI Ekonomi', price: 120000, desc: 'Jakarta - Bandung (KA lokal).' }
        ];

        const categoryMeta = {
            wisata: { label: 'Wisata', icon: iconMapPin() },
            kendaraan: { label: 'Kendaraan', icon: iconBus() }
        };

        const API_TIMEOUT_MS = 15000;
        const DEFAULT_API_EXEC_URL = 'AKfycbw3G5JLdgoHUwl1M8-0Pzr9MZTBwVVXCdmTGh7EadgPjacgPnSY6MkZwLxAuwBxcCjWvg';
            //https://script.google.com/macros/s/AKfycbw3G5JLdgoHUwl1M8-0Pzr9MZTBwVVXCdmTGh7EadgPjacgPnSY6MkZwLxAuwBxcCjWvg/exec'; //input your API execution URL here if needed, or leave empty to auto-resolve
        const API_EXEC_URL = resolveApiExecUrl_();
        const PRINTER_STORAGE_KEY = 'mytix_last_printer';
        const FORCED_PRINTER_LANGUAGE = resolveQueryParam_('lang');
        const FORCED_CODEPAGE_MAPPING = resolveQueryParam_('cp');
        const RECEIPT_COLUMNS_DEFAULT = 32;
        const RECEIPT_COLUMNS_SUPPORTED = {
            32: true,
            35: true,
            42: true,
            44: true,
            48: true
        };
        const FORCED_RECEIPT_COLUMNS = normalizeReceiptColumns_(resolveQueryParam_('cols'));
        const SUPPORTED_CODEPAGE_MAPPINGS = {
            'bixolon': true,
            'bixolon-legacy': true,
            'citizen': true,
            'epson': true,
            'epson-legacy': true,
            'fujitsu': true,
            'hp': true,
            'metapace': true,
            'mpt': true,
            'pos-5890': true,
            'pos-8360': true,
            'star': true,
            'xprinter': true,
            'youku': true
        };
        const CODEPAGE_MAPPING_ALIASES = {
            'bixolonlegacy': 'bixolon-legacy',
            'epsonlegacy': 'epson-legacy',
            'pos5890': 'pos-5890',
            'pos8360': 'pos-8360',
            'zjiang': 'pos-5890'
        };

        let products = [];
        let cart = [];
        let grandTotal = 0;
        let activeCategory = 'all';
        let isSubmittingPayment = false;
        let isPrintingReceipt = false;
        let isConnectingPrinter = false;
        let lastCompletedTransaction = null;
        let receiptPrinter = null;
        let printerSettings = null;
        let connectedPrinterName = '';
        let isPrinterConnected = false;

        const cashInput = document.getElementById('cash-input');
        const paymentModal = document.getElementById('payment-modal');
        const receiptModal = document.getElementById('receipt-modal');
        const confirmPaymentButton = document.getElementById('confirm-payment-button');
        const connectPrinterButton = document.getElementById('connect-printer-button');
        const printReceiptButton = document.getElementById('print-receipt-button');
        const rootEl = document.documentElement;

        function init() {
            applyResponsiveFixes();
            scheduleResponsiveRechecks();
            bindModalEvents();
            setupBluetoothPrinter();
            updateConnectPrinterButtonState();
            updatePrintButtonState();
            setGridMessage('Memuat produk...');
            updateCart();
            loadProducts();
        }

        function scheduleResponsiveRechecks() {
            [120, 420, 1000, 2200].forEach((delayMs) => {
                window.setTimeout(applyResponsiveFixes, delayMs);
            });
        }

        function bindModalEvents() {
            window.addEventListener('resize', applyResponsiveFixes);
            window.addEventListener('orientationchange', applyResponsiveFixes);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', applyResponsiveFixes);
            }

            paymentModal.addEventListener('click', (event) => {
                if (event.target === paymentModal) {
                    closeModal();
                }
            });

            receiptModal.addEventListener('click', (event) => {
                if (event.target === receiptModal) {
                    closeReceipt();
                }
            });

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeModal();
                    closeReceipt();
                }
            });
        }

        function applyResponsiveFixes() {
            const isMobileView = shouldUseMobileView_();
            const viewportScale = isMobileView ? getMobileViewportScale_() : 1;
            const hasDesktopViewportMismatch = viewportScale > 1.1;

            document.body.classList.toggle('mobile-view', isMobileView);
            document.body.classList.toggle('mobile-desktop-viewport', isMobileView && hasDesktopViewportMismatch);
            rootEl.style.setProperty('--mobile-font-scale', String(viewportScale));
            syncStickyOffsets_();
            syncBottomAreaHeight();
        }

        function shouldUseMobileView_() {
            const ua = navigator.userAgent || '';
            const hasMobileUA = /Android|iPhone|iPod|IEMobile|Windows Phone|Mobile/i.test(ua);
            const isTouchDevice = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches)
                || navigator.maxTouchPoints > 0;
            const shortestScreenSide = Math.min(window.screen.width || 0, window.screen.height || 0);

            if (hasMobileUA) {
                return true;
            }

            return isTouchDevice && shortestScreenSide > 0 && shortestScreenSide <= 1024;
        }

        function getMobileViewportScale_() {
            const layoutViewportWidth = Math.max(
                window.innerWidth || 0,
                document.documentElement ? document.documentElement.clientWidth : 0
            );
            const shortestScreenSide = Math.min(window.screen.width || 0, window.screen.height || 0);

            if (!layoutViewportWidth || !shortestScreenSide) {
                return 1;
            }

            const ratio = layoutViewportWidth / shortestScreenSide;
            if (ratio <= 1.1) {
                return 1;
            }

            return Math.min(Math.max(ratio, 1), 2.6);
        }

        function syncBottomAreaHeight() {
            const bottomActionInner = document.querySelector('.bottom-action-inner');
            if (!bottomActionInner) {
                return;
            }

            const measuredHeight = Math.ceil(bottomActionInner.getBoundingClientRect().height + 24);
            rootEl.style.setProperty('--bottom-area-height', `${measuredHeight}px`);
        }

        function syncStickyOffsets_() {
            const appHeader = document.querySelector('.app-header');
            if (!appHeader) {
                return;
            }

            const measuredHeaderHeight = Math.ceil(appHeader.getBoundingClientRect().height);
            if (measuredHeaderHeight > 0) {
                rootEl.style.setProperty('--header-height', `${measuredHeaderHeight}px`);
            }
        }

        function setupBluetoothPrinter() {
            if (typeof WebBluetoothReceiptPrinter !== 'function') {
                connectedPrinterName = '';
                isPrinterConnected = false;
                return;
            }

            receiptPrinter = new WebBluetoothReceiptPrinter();

            receiptPrinter.addEventListener('connected', (eventOrDevice) => {
                applyPrinterConnection_(eventOrDevice);
                updateConnectPrinterButtonState();
            });

            receiptPrinter.addEventListener('disconnected', () => {
                printerSettings = null;
                connectedPrinterName = '';
                isPrinterConnected = false;
                updateConnectPrinterButtonState();
            });

            updateConnectPrinterButtonState();
        }

        function extractPrinterPayload_(eventOrDevice) {
            if (!eventOrDevice) {
                return {};
            }

            const maybeDetail = eventOrDevice.detail && typeof eventOrDevice.detail === 'object'
                ? eventOrDevice.detail
                : eventOrDevice;

            if (maybeDetail.device && typeof maybeDetail.device === 'object') {
                return maybeDetail.device;
            }

            return maybeDetail;
        }

        function applyPrinterConnection_(eventOrDevice) {
            const device = extractPrinterPayload_(eventOrDevice);
            if (!device || typeof device !== 'object') {
                return;
            }

            const normalizedLanguage = normalizePrinterLanguage_(device.language || 'esc-pos');
            const normalizedCodepageMapping = normalizeCodepageMapping_(device.codepageMapping);
            const normalizedColumns = normalizeReceiptColumns_(device.columns);
            printerSettings = {
                language: normalizedLanguage,
                codepageMapping: normalizedCodepageMapping || undefined,
                columns: normalizedColumns || undefined
            };
            connectedPrinterName = String(device.name || 'Printer Bluetooth');
            isPrinterConnected = true;
            rememberPrinter_(device);
        }

        function updatePrintButtonState() {
            if (!printReceiptButton) {
                return;
            }

            const hasReceipt = !!lastCompletedTransaction;
            printReceiptButton.disabled = !hasReceipt || isPrintingReceipt;
            printReceiptButton.innerText = isPrintingReceipt
                ? 'Mencetak...'
                : 'Cetak Struk (Bluetooth)';
        }

        function setPrintingState_(isPrinting) {
            isPrintingReceipt = isPrinting;
            updatePrintButtonState();
        }

        function updateConnectPrinterButtonState() {
            if (!connectPrinterButton) {
                return;
            }

            connectPrinterButton.disabled = isConnectingPrinter;

            if (isConnectingPrinter) {
                connectPrinterButton.innerText = 'Menghubungkan...';
                return;
            }

            if (connectedPrinterName) {
                connectPrinterButton.innerText = `Printer: ${connectedPrinterName}`;
                return;
            }

            connectPrinterButton.innerText = 'Hubungkan Printer Bluetooth';
        }

        function setConnectingPrinterState_(isConnecting) {
            isConnectingPrinter = isConnecting;
            updateConnectPrinterButtonState();
        }

        function getBluetoothContextIssue_() {
            if (!window.isSecureContext) {
                return 'Koneksi printer Bluetooth hanya bisa di HTTPS (URL Web App GAS).';
            }

            const permissionPolicy = document.permissionsPolicy || document.featurePolicy;
            if (permissionPolicy && typeof permissionPolicy.allowsFeature === 'function') {
                try {
                    if (!permissionPolicy.allowsFeature('bluetooth')) {
                        return 'Bluetooth diblokir oleh halaman ini. Buka Web App GAS langsung di tab browser (URL /exec), bukan dari panel editor Apps Script.';
                    }
                } catch (error) {
                    // Ignore permission-policy API quirks and continue checks.
                }
            }

            if (window.top !== window.self) {
                return 'Bluetooth tidak bisa dipakai di mode embed/panel. Buka URL deploy Web App langsung di tab baru.';
            }

            if (!navigator.bluetooth) {
                return 'Browser belum mendukung Web Bluetooth. Gunakan Chrome Android terbaru.';
            }

            return '';
        }

        async function connectPrinterManually() {
            if (isConnectingPrinter) {
                return;
            }

            const contextIssue = getBluetoothContextIssue_();
            if (contextIssue) {
                alert(contextIssue);
                return;
            }

            if (typeof WebBluetoothReceiptPrinter !== 'function') {
                alert('Modul printer belum termuat. Periksa koneksi internet lalu refresh.');
                return;
            }

            if (!receiptPrinter) {
                setupBluetoothPrinter();
            }

            if (!receiptPrinter) {
                alert('Inisialisasi printer Bluetooth gagal.');
                return;
            }

            setConnectingPrinterState_(true);
            try {
                const device = await receiptPrinter.connect();
                applyPrinterConnection_(device);
                await waitForPrinterSettings_(2500);
                if (!isPrinterConnected || !printerSettings) {
                    throw new Error('Printer belum terhubung. Coba pilih printer lagi.');
                }
                alert(`Printer terhubung: ${connectedPrinterName}`);
            } catch (error) {
                console.error(error);
                alert(parsePrinterError_(error));
            } finally {
                setConnectingPrinterState_(false);
                updateConnectPrinterButtonState();
            }
        }

        async function printReceipt() {
            if (!lastCompletedTransaction) {
                alert('Belum ada struk transaksi untuk dicetak.');
                return;
            }

            if (isPrintingReceipt) {
                return;
            }

            const contextIssue = getBluetoothContextIssue_();
            if (contextIssue) {
                alert(contextIssue);
                return;
            }

            if (typeof ReceiptPrinterEncoder !== 'function' || typeof WebBluetoothReceiptPrinter !== 'function') {
                alert('Modul printer belum termuat. Periksa koneksi internet lalu refresh halaman.');
                return;
            }

            setPrintingState_(true);

            try {
                await ensureBluetoothPrinterConnected_();
                const data = buildBluetoothReceiptData_(lastCompletedTransaction);
                await receiptPrinter.print(data);
                alert('Data struk berhasil dikirim ke printer Bluetooth.');
            } catch (error) {
                console.error(error);
                if (error && /messageSize/i.test(String(error.message || ''))) {
                    isPrinterConnected = false;
                    printerSettings = null;
                    connectedPrinterName = '';
                    updateConnectPrinterButtonState();
                }
                alert(parsePrinterError_(error));
            } finally {
                setPrintingState_(false);
            }
        }

        async function ensureBluetoothPrinterConnected_() {
            if (!receiptPrinter) {
                throw new Error('Inisialisasi printer Bluetooth gagal.');
            }

            if (isPrinterConnected && printerSettings) {
                return;
            }

            const rememberedPrinter = getRememberedPrinter_();
            if (rememberedPrinter && typeof receiptPrinter.reconnect === 'function') {
                try {
                    const reconnected = await receiptPrinter.reconnect(rememberedPrinter);
                    applyPrinterConnection_(reconnected);
                    await waitForPrinterSettings_(1200);
                    if (isPrinterConnected && printerSettings) {
                        return;
                    }
                } catch (error) {
                    console.warn('Reconnect printer gagal, lanjut connect manual.', error);
                }
            }

            const connected = await receiptPrinter.connect();
            applyPrinterConnection_(connected);
            await waitForPrinterSettings_(2500);
            if (!isPrinterConnected || !printerSettings) {
                throw new Error('Printer belum terhubung. Pilih perangkat printer lagi.');
            }
        }

        function waitForPrinterSettings_(timeoutMs) {
            if (isPrinterConnected && printerSettings) {
                return Promise.resolve();
            }

            return new Promise((resolve) => {
                const start = Date.now();
                const timer = window.setInterval(() => {
                    if ((isPrinterConnected && printerSettings) || Date.now() - start >= timeoutMs) {
                        window.clearInterval(timer);
                        resolve();
                    }
                }, 120);
            });
        }

        function getRememberedPrinter_() {
            try {
                const rawValue = window.localStorage.getItem(PRINTER_STORAGE_KEY);
                if (!rawValue) {
                    return null;
                }

                const parsedValue = JSON.parse(rawValue);
                if (!parsedValue || typeof parsedValue !== 'object' || !parsedValue.id) {
                    return null;
                }

                const normalizedLanguage = normalizePrinterLanguage_(parsedValue.language || 'esc-pos');
                const normalizedCodepageMapping = normalizeCodepageMapping_(parsedValue.codepageMapping);
                const normalizedColumns = normalizeReceiptColumns_(parsedValue.columns);

                return {
                    id: String(parsedValue.id),
                    name: String(parsedValue.name || ''),
                    type: String(parsedValue.type || 'bluetooth'),
                    language: normalizedLanguage,
                    codepageMapping: normalizedCodepageMapping || undefined,
                    columns: normalizedColumns || undefined
                };
            } catch (error) {
                return null;
            }
        }

        function rememberPrinter_(device) {
            if (!device || !device.id) {
                return;
            }

            const normalizedLanguage = normalizePrinterLanguage_(device.language || 'esc-pos');
            const normalizedCodepageMapping = normalizeCodepageMapping_(device.codepageMapping);
            const normalizedColumns = normalizeReceiptColumns_(device.columns || (printerSettings && printerSettings.columns));
            const storableDevice = {
                id: String(device.id),
                name: String(device.name || ''),
                type: String(device.type || 'bluetooth'),
                language: normalizedLanguage,
                codepageMapping: normalizedCodepageMapping || undefined,
                columns: normalizedColumns || undefined
            };

            try {
                window.localStorage.setItem(PRINTER_STORAGE_KEY, JSON.stringify(storableDevice));
            } catch (error) {
                console.warn('Menyimpan device printer gagal.', error);
            }
        }

        function parsePrinterError_(error) {
            if (!error) {
                return 'Gagal mencetak struk via Bluetooth.';
            }

            const rawMessage = String(error.message || '').trim();

            if (/messageSize/i.test(rawMessage)) {
                return 'Printer belum siap dipakai. Hubungkan ulang lewat tombol "Hubungkan Printer Bluetooth", lalu coba cetak lagi.';
            }

            if (/unknown codepage mapping/i.test(rawMessage)) {
                return 'Codepage printer tidak dikenali. Sistem sudah mencoba fallback otomatis, coba hubungkan ulang printer lalu cetak lagi.';
            }

            if (error.name === 'NotFoundError') {
                return 'Tidak ada printer yang dipilih pada dialog Bluetooth.';
            }

            if (error.name === 'SecurityError') {
                return 'Akses Bluetooth ditolak. Pastikan gunakan HTTPS dan beri izin Bluetooth.';
            }

            if (error.name === 'NotAllowedError') {
                return 'Akses Bluetooth ditolak oleh browser/permission.';
            }

            if (!rawMessage) {
                return 'Gagal mencetak struk via Bluetooth.';
            }

            if (/user cancelled|cancelled|aborted/i.test(rawMessage)) {
                return 'Pemilihan printer dibatalkan.';
            }

            return rawMessage;
        }

        function buildBluetoothReceiptData_(transaction) {
            const width = getReceiptColumns_();
            let encoder = null;
            try {
                encoder = createReceiptEncoder_();
            } catch (error) {
                console.warn('Encoder setup fallback dipakai:', error);
                try {
                    encoder = new ReceiptPrinterEncoder({
                        language: 'esc-pos',
                        columns: width,
                        codepageMapping: 'epson'
                    });
                } catch (fallbackError) {
                    console.warn('Fallback epson gagal, pakai default encoder.', fallbackError);
                    try {
                        encoder = new ReceiptPrinterEncoder({
                            language: 'esc-pos',
                            columns: width
                        });
                    } catch (finalError) {
                        console.warn('Fallback esc-pos gagal, pakai konfigurasi encoder default.', finalError);
                        encoder = new ReceiptPrinterEncoder({ columns: width });
                    }
                }
            }
            const safeItems = Array.isArray(transaction.items) ? transaction.items : [];

            encoder = encoder
                .initialize()
                .align('center')
                .bold(true)
                .line('MYTIX POS')
                .bold(false)
                .line('Official Receipt')
                .newline()
                .align('left')
                .line(`No: ${sanitizePrintText_(transaction.transactionId, Math.max(10, width - 4))}`)
                .line(`Tanggal: ${sanitizePrintText_(transaction.createdAtDisplay, Math.max(10, width - 9))}`)
                .line(`Metode: ${sanitizePrintText_(transaction.paymentMethodLabel, Math.max(8, width - 8))}`)
                .line('-'.repeat(width));

            safeItems.forEach((item) => {
                const qty = toPositiveInteger(item.qty);
                const unitPrice = toPositiveInteger(item.unitPrice);
                const subtotal = toPositiveInteger(item.subtotal);
                const itemNameLines = wrapReceiptText_(item.name || item.id || '-', width);

                itemNameLines.forEach((lineText) => {
                    encoder = encoder.line(lineText);
                });

                encoder = encoder
                    .line(formatReceiptLine_(`  ${qty} x ${formatReceiptAmountCompact_(unitPrice)}`, formatReceiptAmountCompact_(subtotal), width));
            });

            encoder = encoder
                .line('-'.repeat(width))
                .bold(true)
                .line(formatReceiptLine_('TOTAL', formatReceiptAmount_(transaction.total), width))
                .bold(false)
                .line(formatReceiptLine_('Bayar', formatReceiptAmount_(transaction.cashReceived), width))
                .line(formatReceiptLine_('Kembalian', formatReceiptAmount_(transaction.changeAmount), width))
                .newline()
                .align('center')
                .line('Terima kasih')
                .line('Simpan struk ini')
                .newline()
                .cut();

            return encoder.encode();
        }

        function normalizePrinterLanguage_(languageValue) {
            const normalized = String(languageValue || '').trim().toLowerCase();
            if (!normalized) {
                return 'esc-pos';
            }

            if (normalized === 'star-prnt') {
                return 'star-prnt';
            }

            if (normalized === 'star-line') {
                return 'star-line';
            }

            return 'esc-pos';
        }

        function normalizeReceiptColumns_(value) {
            const numericValue = Number(value);
            if (!Number.isFinite(numericValue)) {
                return 0;
            }

            const roundedValue = Math.round(numericValue);
            if (!RECEIPT_COLUMNS_SUPPORTED[roundedValue]) {
                return 0;
            }

            return roundedValue;
        }

        function getReceiptColumns_() {
            if (FORCED_RECEIPT_COLUMNS) {
                return FORCED_RECEIPT_COLUMNS;
            }

            const connectedColumns = normalizeReceiptColumns_(printerSettings && printerSettings.columns);
            if (connectedColumns) {
                return connectedColumns;
            }

            return RECEIPT_COLUMNS_DEFAULT;
        }

        function normalizeCodepageMapping_(mappingValue) {
            if (mappingValue && typeof mappingValue === 'object' && !Array.isArray(mappingValue)) {
                const customMapping = sanitizeCustomCodepageMapping_(mappingValue);
                return customMapping || '';
            }

            const normalized = String(mappingValue || '').trim().toLowerCase();
            if (!normalized || normalized === 'default' || normalized === 'auto' || normalized === 'unknown' || normalized === 'none') {
                return '';
            }

            const mappedAlias = CODEPAGE_MAPPING_ALIASES[normalized] || normalized;
            if (!SUPPORTED_CODEPAGE_MAPPINGS[mappedAlias]) {
                return '';
            }

            return mappedAlias;
        }

        function sanitizeCustomCodepageMapping_(mappingObject) {
            const safeMapping = {};
            const keys = Object.keys(mappingObject || {});
            keys.forEach((key) => {
                const normalizedKey = String(key || '').trim().toLowerCase();
                const rawValue = mappingObject[key];
                const numericValue = Number(rawValue);
                if (/^cp\d+$/i.test(normalizedKey) && Number.isFinite(numericValue) && numericValue >= 0) {
                    safeMapping[normalizedKey] = numericValue;
                }
            });

            return Object.keys(safeMapping).length ? safeMapping : null;
        }

        function createReceiptEncoder_() {
            const connectedLanguage = normalizePrinterLanguage_(printerSettings && printerSettings.language);
            const forcedLanguage = normalizePrinterLanguage_(FORCED_PRINTER_LANGUAGE);
            const language = FORCED_PRINTER_LANGUAGE ? forcedLanguage : connectedLanguage;
            const forcedMapping = normalizeCodepageMapping_(FORCED_CODEPAGE_MAPPING);
            const preferredMapping = forcedMapping || normalizeCodepageMapping_(printerSettings && printerSettings.codepageMapping);
            const columns = getReceiptColumns_();
            const attempts = [];

            if (preferredMapping) {
                attempts.push({ language, columns, codepageMapping: preferredMapping });
            }

            if (language === 'esc-pos') {
                attempts.push({ language, columns, codepageMapping: 'epson' });
                attempts.push({ language, columns, codepageMapping: 'xprinter' });
                attempts.push({ language, columns, codepageMapping: 'pos-5890' });
                attempts.push({ language, columns, codepageMapping: 'mpt' });
                attempts.push({ language, columns, codepageMapping: 'star' });
            }

            attempts.push({ language, columns });
            attempts.push({ columns });
            attempts.push({ language });
            attempts.push({});

            const seen = {};
            for (const option of attempts) {
                const key = JSON.stringify(option);
                if (seen[key]) {
                    continue;
                }
                seen[key] = true;

                try {
                    return new ReceiptPrinterEncoder(option);
                } catch (error) {
                    const message = String(error && error.message ? error.message : '');
                    if (/unknown codepage mapping/i.test(message)) {
                        continue;
                    }
                    throw error;
                }
            }

            return new ReceiptPrinterEncoder();
        }

        function sanitizePrintText_(value, maxLength) {
            const cleanText = String(value || '')
                .replace(/[\u0000-\u001f\u007f]/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            if (!maxLength || cleanText.length <= maxLength) {
                return cleanText;
            }

            return cleanText.slice(0, maxLength);
        }

        function wrapReceiptText_(value, width) {
            const safeWidth = Math.max(8, toPositiveInteger(width));
            const cleanText = sanitizePrintText_(value, 220);
            if (!cleanText) {
                return ['-'];
            }

            if (cleanText.length <= safeWidth) {
                return [cleanText];
            }

            const words = cleanText.split(' ');
            const lines = [];
            let currentLine = '';

            words.forEach((word) => {
                if (!word) {
                    return;
                }

                if (word.length > safeWidth) {
                    if (currentLine) {
                        lines.push(currentLine);
                        currentLine = '';
                    }

                    let remaining = word;
                    while (remaining.length > safeWidth) {
                        lines.push(remaining.slice(0, safeWidth));
                        remaining = remaining.slice(safeWidth);
                    }
                    currentLine = remaining;
                    return;
                }

                const nextLine = currentLine ? `${currentLine} ${word}` : word;
                if (nextLine.length > safeWidth) {
                    lines.push(currentLine);
                    currentLine = word;
                    return;
                }

                currentLine = nextLine;
            });

            if (currentLine) {
                lines.push(currentLine);
            }

            return lines.length ? lines : [cleanText.slice(0, safeWidth)];
        }

        function formatReceiptLine_(leftText, rightText, width) {
            const safeRight = sanitizePrintText_(rightText, width - 1);
            const maxLeftLength = Math.max(1, width - safeRight.length - 1);
            const safeLeft = sanitizePrintText_(leftText, maxLeftLength);
            const spacing = Math.max(1, width - safeLeft.length - safeRight.length);

            return `${safeLeft}${' '.repeat(spacing)}${safeRight}`;
        }

        function formatReceiptAmountCompact_(value) {
            return formatNumberID(toPositiveInteger(value));
        }

        function formatReceiptAmount_(value) {
            return `Rp ${formatReceiptAmountCompact_(value)}`;
        }

        function resolveApiExecUrl_() {
            try {
                const queryApi = resolveQueryParam_('api');
                if (queryApi) {
                    return normalizeApiUrl_(queryApi);
                }
            } catch (error) {
                console.warn('Gagal membaca parameter query API.', error);
            }

            const globalApi = typeof window.MYTIX_API_EXEC_URL === 'string' ? window.MYTIX_API_EXEC_URL : '';
            if (globalApi.trim()) {
                return normalizeApiUrl_(globalApi);
            }

            return normalizeApiUrl_(DEFAULT_API_EXEC_URL);
        }

        function resolveQueryParam_(paramName) {
            try {
                return new URLSearchParams(window.location.search).get(paramName);
            } catch (error) {
                return '';
            }
        }

        function normalizeApiUrl_(urlValue) {
            const normalizedValue = String(urlValue || '').trim();
            if (!normalizedValue) {
                return '';
            }

            return normalizedValue.replace(/[?&]$/, '');
        }

        function getBackendMode_() {
            if (isAppsScriptRuntime()) {
                return 'apps-script-runtime';
            }

            if (API_EXEC_URL) {
                return 'http-api';
            }

            return 'local-fallback';
        }

        function loadProducts() {
            if (getBackendMode_() === 'local-fallback') {
                products = fallbackProducts.map(normalizeProduct).filter(Boolean);
                renderProducts(activeCategory);
                return;
            }

            callServer('getProducts')
                .then((response) => {
                    if (!response || response.ok !== true || !Array.isArray(response.data)) {
                        throw new Error('Respon data produk tidak valid.');
                    }
                    products = response.data.map(normalizeProduct).filter(Boolean);
                    renderProducts(activeCategory);
                })
                .catch((error) => {
                    console.error(error);
                    products = fallbackProducts.map(normalizeProduct).filter(Boolean);
                    renderProducts(activeCategory);
                    alert('Gagal memuat produk dari server. Aplikasi memakai data lokal sementara.');
                });
        }

        function isAppsScriptRuntime() {
            return typeof google !== 'undefined' && google.script && google.script.run;
        }

        function callServer(methodName, ...args) {
            if (isAppsScriptRuntime()) {
                return callAppsScriptServer_(methodName, ...args);
            }

            return callHttpApiServer_(methodName, ...args);
        }

        function callAppsScriptServer_(methodName, ...args) {
            return new Promise((resolve, reject) => {
                if (!isAppsScriptRuntime()) {
                    reject(new Error('Runtime Google Apps Script tidak tersedia.'));
                    return;
                }

                let settled = false;
                const timeoutId = window.setTimeout(() => {
                    if (!settled) {
                        settled = true;
                        reject(new Error('Permintaan ke server melebihi batas waktu.'));
                    }
                }, API_TIMEOUT_MS);

                const onSuccess = (result) => {
                    if (settled) {
                        return;
                    }
                    settled = true;
                    window.clearTimeout(timeoutId);
                    resolve(result);
                };

                const onFailure = (error) => {
                    if (settled) {
                        return;
                    }
                    settled = true;
                    window.clearTimeout(timeoutId);
                    reject(new Error(error && error.message ? error.message : 'Terjadi kesalahan dari server.'));
                };

                const runner = google.script.run
                    .withSuccessHandler(onSuccess)
                    .withFailureHandler(onFailure);

                if (typeof runner[methodName] !== 'function') {
                    settled = true;
                    window.clearTimeout(timeoutId);
                    reject(new Error(`Fungsi server "${methodName}" tidak ditemukan.`));
                    return;
                }

                runner[methodName](...args);
            });
        }

        function callHttpApiServer_(methodName, ...args) {
            if (methodName === 'getProducts') {
                return callHttpApi_('products');
            }

            if (methodName === 'createTransaction') {
                const payload = args && args.length ? args[0] : {};
                return callHttpApi_('create-transaction', payload);
            }

            return Promise.reject(new Error(`Method "${methodName}" tidak didukung di mode HTTP API.`));
        }

        async function callHttpApi_(action, payload) {
            if (!API_EXEC_URL) {
                throw new Error('URL API Apps Script belum diset.');
            }

            const endpointUrl = buildApiEndpointUrl_(action);
            const controller = new AbortController();
            const timeoutId = window.setTimeout(() => controller.abort(), API_TIMEOUT_MS);

            try {
                let response;

                if (action === 'create-transaction') {
                    const body = JSON.stringify({
                        action,
                        payload: payload || {},
                    });

                    response = await fetch(endpointUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain',
                        },
                        body,
                        signal: controller.signal,
                        cache: 'no-store',
                    });
                } else {
                    response = await fetch(endpointUrl, {
                        method: 'GET',
                        signal: controller.signal,
                        cache: 'no-store',
                    });
                }

                const rawBody = await response.text();
                if (!rawBody || !rawBody.trim()) {
                    throw new Error('Respon API kosong.');
                }

                let parsedResponse = null;
                try {
                    parsedResponse = JSON.parse(rawBody);
                } catch (error) {
                    throw new Error('Respon API bukan JSON valid. Pastikan endpoint Apps Script sudah mode API terbaru.');
                }

                if (!response.ok) {
                    const errorMessage = parsedResponse && parsedResponse.error && parsedResponse.error.message
                        ? parsedResponse.error.message
                        : `HTTP ${response.status}`;
                    throw new Error(errorMessage);
                }

                if (!parsedResponse || typeof parsedResponse !== 'object') {
                    throw new Error('Format respon API tidak valid.');
                }

                if (parsedResponse.ok !== true) {
                    const errorMessage = parsedResponse.error && parsedResponse.error.message
                        ? parsedResponse.error.message
                        : 'Permintaan API gagal.';
                    throw new Error(errorMessage);
                }

                return parsedResponse;
            } catch (error) {
                if (error && error.name === 'AbortError') {
                    throw new Error('Permintaan API timeout.');
                }

                throw error;
            } finally {
                window.clearTimeout(timeoutId);
            }
        }

        function buildApiEndpointUrl_(action) {
            try {
                const urlObj = new URL(API_EXEC_URL);
                urlObj.searchParams.set('action', action);
                return urlObj.toString();
            } catch (error) {
                const separator = API_EXEC_URL.includes('?') ? '&' : '?';
                return `${API_EXEC_URL}${separator}action=${encodeURIComponent(action)}`;
            }
        }

        function filterCategory(category, buttonEl) {
            activeCategory = category;
            document.querySelectorAll('.pill').forEach((pill) => pill.classList.remove('active'));
            buttonEl.classList.add('active');
            renderProducts(category);
        }

        function renderProducts(category) {
            const grid = document.getElementById('ticket-grid');
            grid.innerHTML = '';

            if (!products.length) {
                setGridMessage('Produk belum tersedia.');
                return;
            }

            const filteredProducts = category === 'all'
                ? products
                : products.filter((product) => product.category === category);

            if (!filteredProducts.length) {
                setGridMessage('Produk untuk kategori ini belum tersedia.');
                return;
            }

            filteredProducts.forEach((item) => {
                const card = document.createElement('article');
                card.className = 'ticket-card';
                card.onclick = () => addToCart(item);

                const meta = categoryMeta[item.category] || { label: 'Lainnya', icon: iconGrid() };
                const compactPrice = formatNumberID(item.price);
                const longPriceClass = compactPrice.length >= 8 ? 'is-long' : '';
                card.innerHTML = `
                    <div class="ticket-main">
                        <span class="ticket-meta ${item.category}">${meta.icon}${meta.label}</span>
                        <h3>${escapeHtml(item.name)}</h3>
                        <p>${escapeHtml(item.desc)}</p>
                    </div>
                    <span class="ticket-divider" aria-hidden="true">
                        <span class="ticket-divider-line"></span>
                    </span>
                    <div class="ticket-side">
                        <span class="price-label">Harga</span>
                        <span class="price-tag ${longPriceClass}">
                            <span class="price-currency">Rp</span>
                            <span class="price-value">${compactPrice}</span>
                        </span>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function setGridMessage(message) {
            const grid = document.getElementById('ticket-grid');
            grid.innerHTML = `<div class="empty-state">${escapeHtml(message)}</div>`;
        }

        function normalizeProduct(rawProduct) {
            if (!rawProduct || typeof rawProduct !== 'object') {
                return null;
            }

            const id = String(rawProduct.id || '').trim();
            const name = String(rawProduct.name || '').trim();
            const category = String(rawProduct.category || 'lainnya').trim().toLowerCase();
            const desc = String(rawProduct.desc || '').trim();
            const price = toPositiveInteger(rawProduct.price);

            if (!id || !name || price <= 0) {
                return null;
            }

            return { id, category, name, desc, price };
        }

        function toPositiveInteger(value) {
            const numericValue = Number(value);
            if (!Number.isFinite(numericValue) || numericValue <= 0) {
                return 0;
            }
            return Math.floor(numericValue);
        }

        function addToCart(item) {
            const foundItem = cart.find((cartItem) => cartItem.id === item.id);
            if (foundItem) {
                foundItem.qty += 1;
            } else {
                cart.push({ ...item, qty: 1 });
            }

            updateCart();
            vibrate();
        }

        function updateCart() {
            const count = cart.reduce((accumulator, item) => accumulator + item.qty, 0);
            grandTotal = cart.reduce((accumulator, item) => accumulator + (item.price * item.qty), 0);

            document.getElementById('cart-count').innerText = count;
            document.getElementById('bottom-total-text').innerText = formatIDR(grandTotal);
            document.getElementById('checkout-button').disabled = count === 0;
        }

        function openCheckout() {
            if (cart.length === 0) {
                alert('Keranjang masih kosong.');
                return;
            }

            document.getElementById('modal-grand-total').innerText = formatIDR(grandTotal);
            paymentModal.classList.add('active');
            paymentModal.setAttribute('aria-hidden', 'false');
            calculateChange();
            cashInput.focus();
        }

        function closeModal() {
            paymentModal.classList.remove('active');
            paymentModal.setAttribute('aria-hidden', 'true');
        }

        function setCash(type) {
            if (type === 'pas') {
                cashInput.value = grandTotal;
            }
            calculateChange();
        }

        function addCash(value) {
            const current = parseMoneyInput(cashInput.value);
            cashInput.value = current + value;
            calculateChange();
        }

        function clearCash() {
            cashInput.value = '';
            calculateChange();
        }

        function roundTotal() {
            cashInput.value = Math.ceil(grandTotal / 1000) * 1000;
            calculateChange();
        }

        function parseMoneyInput(value) {
            const numericValue = Number(value);
            if (!Number.isFinite(numericValue) || numericValue <= 0) {
                return 0;
            }
            return Math.floor(numericValue);
        }

        function calculateChange() {
            const cashValue = parseMoneyInput(cashInput.value);
            const changeValue = cashValue - grandTotal;
            const changeEl = document.getElementById('change-text');

            if (changeValue < 0) {
                changeEl.innerText = `-${formatIDR(Math.abs(changeValue))}`;
                changeEl.style.color = 'var(--danger)';
                return;
            }

            changeEl.innerText = formatIDR(changeValue);
            changeEl.style.color = 'var(--success)';
        }

        function processPayment() {
            if (isSubmittingPayment) {
                return;
            }

            if (cart.length === 0) {
                alert('Keranjang masih kosong.');
                return;
            }

            const cashValue = parseMoneyInput(cashInput.value);
            if (cashValue < grandTotal) {
                alert('Nominal pembayaran kurang.');
                cashInput.focus();
                return;
            }

            const payload = {
                paymentMethod: 'cash',
                cashReceived: cashValue,
                items: cart.map((item) => ({ id: item.id, qty: item.qty }))
            };

            const handleSuccess = (transactionData) => {
                renderReceipt(transactionData);
                closeModal();
                receiptModal.classList.add('active');
                receiptModal.setAttribute('aria-hidden', 'false');
            };

            const handleFailure = (error) => {
                alert(error.message || 'Gagal memproses pembayaran. Coba lagi.');
            };

            isSubmittingPayment = true;
            if (confirmPaymentButton) {
                confirmPaymentButton.disabled = true;
                confirmPaymentButton.innerText = 'Memproses...';
            }

            if (getBackendMode_() === 'local-fallback') {
                const fallbackTransaction = buildLocalTransactionResult(cashValue);
                handleSuccess(fallbackTransaction);
                isSubmittingPayment = false;
                if (confirmPaymentButton) {
                    confirmPaymentButton.disabled = false;
                    confirmPaymentButton.innerText = 'Konfirmasi Pembayaran';
                }
                return;
            }

            callServer('createTransaction', payload)
                .then((response) => {
                    if (!response || response.ok !== true || !response.data) {
                        throw new Error('Respon transaksi dari server tidak valid.');
                    }
                    handleSuccess(response.data);
                })
                .catch((error) => {
                    console.error(error);
                    handleFailure(error);
                })
                .finally(() => {
                    isSubmittingPayment = false;
                    if (confirmPaymentButton) {
                        confirmPaymentButton.disabled = false;
                        confirmPaymentButton.innerText = 'Konfirmasi Pembayaran';
                    }
                });
        }

        function buildLocalTransactionResult(cashValue) {
            const transactionDate = new Date();
            return {
                transactionId: buildTransactionId(transactionDate),
                createdAtDisplay: transactionDate.toLocaleString('id-ID'),
                paymentMethod: 'cash',
                paymentMethodLabel: 'Tunai',
                total: grandTotal,
                cashReceived: cashValue,
                changeAmount: cashValue - grandTotal,
                items: cart.map((item) => ({
                    id: item.id,
                    name: item.name,
                    qty: item.qty,
                    unitPrice: item.price,
                    subtotal: item.price * item.qty
                }))
            };
        }

        function normalizeTransactionForReceipt_(transaction) {
            const safeItems = Array.isArray(transaction && transaction.items) ? transaction.items : [];
            return {
                transactionId: String(transaction && transaction.transactionId ? transaction.transactionId : buildTransactionId(new Date())),
                createdAtDisplay: String(transaction && transaction.createdAtDisplay ? transaction.createdAtDisplay : new Date().toLocaleString('id-ID')),
                paymentMethodLabel: String(transaction && transaction.paymentMethodLabel ? transaction.paymentMethodLabel : 'Tunai'),
                total: toPositiveInteger(transaction && transaction.total),
                cashReceived: toPositiveInteger(transaction && transaction.cashReceived),
                changeAmount: toPositiveInteger(transaction && transaction.changeAmount),
                items: safeItems.map((item) => ({
                    id: String(item && item.id ? item.id : ''),
                    name: String(item && item.name ? item.name : item && item.id ? item.id : '-'),
                    qty: toPositiveInteger(item && item.qty),
                    unitPrice: toPositiveInteger(item && item.unitPrice),
                    subtotal: toPositiveInteger(item && item.subtotal)
                }))
            };
        }

        function renderReceipt(transaction) {
            const normalizedTransaction = normalizeTransactionForReceipt_(transaction);
            lastCompletedTransaction = normalizedTransaction;
            updatePrintButtonState();

            const transactionId = escapeHtml(normalizedTransaction.transactionId);
            const createdAt = escapeHtml(normalizedTransaction.createdAtDisplay);
            const paymentMethodLabel = escapeHtml(normalizedTransaction.paymentMethodLabel);
            const total = normalizedTransaction.total;
            const cashReceived = normalizedTransaction.cashReceived;
            const changeAmount = normalizedTransaction.changeAmount;

            const safeItems = normalizedTransaction.items;
            const receiptItems = safeItems.map((item) => `
                <tr>
                    <td>
                        <span class="receipt-item-name">${escapeHtml(item.name || item.id || '-')}</span>
                        <span class="receipt-item-qty">${toPositiveInteger(item.qty)} x ${formatIDR(toPositiveInteger(item.unitPrice))}</span>
                    </td>
                    <td>${formatIDR(toPositiveInteger(item.subtotal))}</td>
                </tr>
            `).join('');

            const receiptHTML = `
                <div class="receipt-paper">
                    <div class="receipt-head">
                        <h3 id="receipt-title">MYTIX PREMIUM</h3>
                        <p>Official Sales Receipt</p>
                    </div>

                    <div class="receipt-meta">
                        <div class="receipt-meta-line">
                            <span>No. Transaksi</span>
                            <strong>${transactionId}</strong>
                        </div>
                        <div class="receipt-meta-line">
                            <span>Tanggal</span>
                            <strong>${createdAt}</strong>
                        </div>
                        <div class="receipt-meta-line">
                            <span>Metode</span>
                            <strong>${paymentMethodLabel}</strong>
                        </div>
                    </div>

                    <table class="receipt-table">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${receiptItems}
                        </tbody>
                    </table>

                    <div class="receipt-summary">
                        <div class="receipt-summary-line total">
                            <span>Total</span>
                            <strong>${formatIDR(total)}</strong>
                        </div>
                        <div class="receipt-summary-line">
                            <span>Bayar</span>
                            <strong>${formatIDR(cashReceived)}</strong>
                        </div>
                        <div class="receipt-summary-line change">
                            <span>Kembalian</span>
                            <strong>${formatIDR(changeAmount)}</strong>
                        </div>
                    </div>

                    <p class="receipt-footer">Terima kasih. Simpan struk ini sebagai bukti transaksi.</p>
                </div>
            `;

            document.getElementById('receipt-content').innerHTML = receiptHTML;
        }

        function closeReceipt() {
            receiptModal.classList.remove('active');
            receiptModal.setAttribute('aria-hidden', 'true');
        }

        function startNewTransaction() {
            closeReceipt();
            clearCash();
            cart = [];
            grandTotal = 0;
            lastCompletedTransaction = null;
            updatePrintButtonState();
            updateCart();
        }

        function formatIDR(value) {
            return `Rp ${Number(value).toLocaleString('id-ID')}`;
        }

        function formatNumberID(value) {
            return Number(value).toLocaleString('id-ID');
        }

        function buildTransactionId(dateValue) {
            const year = dateValue.getFullYear();
            const month = String(dateValue.getMonth() + 1).padStart(2, '0');
            const date = String(dateValue.getDate()).padStart(2, '0');
            const hours = String(dateValue.getHours()).padStart(2, '0');
            const minutes = String(dateValue.getMinutes()).padStart(2, '0');
            const seconds = String(dateValue.getSeconds()).padStart(2, '0');
            return `TRX-${year}${month}${date}-${hours}${minutes}${seconds}`;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function vibrate() {
            if ('vibrate' in navigator) {
                navigator.vibrate(40);
            }
        }

        function iconMapPin() {
            return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-4.4 7-10a7 7 0 1 0-14 0c0 5.6 7 10 7 10z"></path><circle cx="12" cy="11" r="2.5"></circle></svg>';
        }

        function iconBus() {
            return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="12" rx="2"></rect><path d="M7 16v2"></path><path d="M17 16v2"></path><circle cx="8" cy="18" r="1"></circle><circle cx="16" cy="18" r="1"></circle></svg>';
        }

        function iconGrid() {
            return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="6" height="6" rx="1"></rect><rect x="14" y="4" width="6" height="6" rx="1"></rect><rect x="4" y="14" width="6" height="6" rx="1"></rect><rect x="14" y="14" width="6" height="6" rx="1"></rect></svg>';
        }

        window.onload = init;
    </script>
</body>
</html>
